<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#101827" />
    <title>苔原小勇者 · Mossbound Journey</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 fill=%22%23101827%22/><rect x=%223%22 y=%224%22 width=%2210%22 height=%228%22 fill=%22%2384a94b%22/><rect x=%225%22 y=%226%22 width=%222%22 height=%222%22 fill=%22%23101827%22/><rect x=%229%22 y=%226%22 width=%222%22 height=%222%22 fill=%22%23101827%22/></svg>" />
    <link rel="manifest" href="manifest.webmanifest?v=20260712-1" />
    <link rel="stylesheet" href="styles.css?v=20260712-1" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <p class="eyebrow">STORYBOOK ADVENTURE</p>
          <h1>苔原小勇者</h1>
        </div>
        <div class="header-actions">
          <button id="muteButton" type="button" aria-label="切换音乐和音效">音乐：开</button>
          <button id="fullscreenButton" type="button">全屏</button>
        </div>
      </header>

      <section class="screen-frame" aria-label="卡通绘本风横版闯关游戏">
        <div class="screen-glow"></div>
        <canvas id="game" width="960" height="540" tabindex="0" aria-label="游戏画面"></canvas>
        <div class="scanlines" aria-hidden="true"></div>
      </section>

      <div class="touch-controls" aria-label="触屏控制">
        <div class="touch-group">
          <button class="touch-key" data-key="ArrowLeft" aria-label="向左">◀</button>
          <button class="touch-key" data-key="ArrowRight" aria-label="向右">▶</button>
        </div>
        <div class="touch-group touch-actions">
          <button class="touch-key dash-key" data-key="ShiftLeft" aria-label="冲刺">冲</button>
          <button class="touch-key jump-key" data-key="Space" aria-label="跳跃">跳</button>
        </div>
      </div>

      <footer class="game-footer">
        <span><kbd>A</kbd><kbd>D</kbd> / <kbd>←</kbd><kbd>→</kbd> 移动</span>
        <span><kbd>W</kbd> / <kbd>空格</kbd> 跳跃（长按更高）</span>
        <span><kbd>SHIFT</kbd> / <kbd>J</kbd> 冲刺</span>
        <span><kbd>P</kbd> 暂停</span>
        <span><kbd>R</kbd> 重开</span>
      </footer>
      <p id="status" class="sr-only" aria-live="polite"></p>
    </main>
    <script src="game.js?v=20260712-1"></script>
  </body>
</html>
